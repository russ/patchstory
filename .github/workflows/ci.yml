name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node >= 22.6 is required: the test runner executes TypeScript
          # directly via native type stripping (default-on in 24.x).
          node-version: "24"
          cache: "npm"

      - name: Install (runs the prepare build)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
