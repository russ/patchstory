name: Publish to npm

# Publishes via OIDC "trusted publishing" — NO npm token, nothing to expire.
#
# One-time setup on npmjs.com (after the package's first publish):
#   patchstory package → Settings → Trusted Publishers → Add GitHub Actions:
#     Organization or user: russ
#     Repository:           patchstory
#     Workflow filename:    publish.yml
#     Environment:          (leave blank)
#
# Then publishing is just: GitHub → Releases → Draft a new release → Publish.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # mint the short-lived OIDC token npm exchanges for a publish

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # OIDC trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Verify
        run: |
          npm run typecheck
          npm test

      # No NODE_AUTH_TOKEN: npm authenticates via OIDC and attaches provenance
      # automatically when the package has a matching trusted publisher.
      - name: Publish
        run: npm publish --workspace packages/cli --access public
