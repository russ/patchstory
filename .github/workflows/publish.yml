name: Publish to npm

# Fires when you publish a GitHub Release (Releases → Draft a new release).
# Requires an NPM_TOKEN repo secret (Settings → Secrets → Actions) — an npm
# "Automation" access token. The job also emits build provenance via OIDC.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for `npm publish --provenance`

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci

      - name: Verify before publish
        run: |
          npm run typecheck
          npm test

      - name: Publish (prepack rebuilds the bundle)
        run: npm publish --workspace packages/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
